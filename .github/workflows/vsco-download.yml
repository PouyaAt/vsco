name: VSCO Downloader

on:
  workflow_dispatch:
    inputs:
      username:
        description: "VSCO username to download"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run VSCO downloader
      run: |
        python vsco_downloader.py "${{ github.event.inputs.username }}"

    - name: Commit and push downloads
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add downloads/
        git commit -m "Downloaded VSCO posts for ${{ github.event.inputs.username }}" || echo "No new files"
        git push
