name: VSCO Downloader with Logs

on:
  workflow_dispatch:
    inputs:
      username:
        description: "VSCO username to download"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run VSCO downloader and capture logs
      run: |
        mkdir -p downloads logs
        (
          echo "==== VSCO Downloader Started ===="
          echo "Username: ${{ github.event.inputs.username }}"
          python vsco_downloader.py "${{ github.event.inputs.username }}" 2>&1
          echo "==== Completed ===="
        ) | tee logs/log.txt

        # Save any errors found from log.txt into error.txt for easier tracking
        grep -i "error" logs/log.txt > logs/error.txt || echo "No errors detected." > logs/error.txt

    - name: Commit and push results (downloads + logs)
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add downloads/ logs/
        git commit -m "VSCO run for ${{ github.event.inputs.username }} — logs & media" || echo "Nothing new to commit"
        git push
