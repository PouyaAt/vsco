
          
name: VSCO Downloader with Logs

on:
  workflow_dispatch:
    inputs:
      username:
        description: "VSCO username to download"
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run VSCO downloader and capture logs
      run: |
        mkdir -p downloads
        mkdir -p logs

        echo "==== VSCO Downloader Started ====" > logs/log.txt
        echo "Username: ${{ github.event.inputs.username }}" >> logs/log.txt

        python vsco_downloader.py "${{ github.event.inputs.username }}" >> logs/log.txt 2>&1 || true

        echo "==== Completed ====" >> logs/log.txt

        grep -i "error" logs/log.txt > logs/error.txt || echo "No errors detected." > logs/error.txt

    - name: Commit and push results
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add downloads logs || true

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "VSCO run for ${{ github.event.inputs.username }} — logs & media"
          git push origin HEAD
        fi
    - name: Probe downloader sites
      run: |
        python site_probe.py
